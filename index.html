<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Prestação de Contas — SOS Quatro Patas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --ink:#1F2D3D;
    --ink-soft:#425368;
    --paper:#FBF9F4;
    --chrome:#EDEEE9;
    --chrome-2:#E2E4DC;
    --line:#D9D4C4;
    --line-soft:#E7E3D6;
    --ok:#3D6657;
    --ok-bg:#E4EEE8;
    --warn:#A9752B;
    --warn-bg:#F6ECD9;
    --danger:#9C4A3E;
    --danger-bg:#F5E4E0;
    --muted:#767467;
    --font-serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:var(--font-sans); background:var(--chrome); color:var(--ink);
  }
  .app{ display:flex; min-height:640px; }
  .sidebar{
    width:230px; background:var(--chrome-2); border-right:1px solid var(--line);
    padding:20px 14px; flex-shrink:0;
  }
  .brand{ font-family:var(--font-serif); font-size:16px; font-weight:bold; letter-spacing:.3px; margin-bottom:2px;}
  .brand-sub{ font-size:11px; color:var(--muted); margin-bottom:20px; }
  .nav-item{
    display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:6px;
    font-size:13.5px; cursor:pointer; color:var(--ink-soft); margin-bottom:2px;
  }
  .nav-item:hover{ background:var(--chrome); }
  .nav-item.active{ background:var(--ink); color:#fff; }
  .nav-section-label{
    font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted);
    margin:18px 0 6px 10px;
  }
  .main{ flex:1; padding:26px 32px; overflow-x:auto; }
  h1.page-title{ font-family:var(--font-serif); font-size:22px; margin:0 0 4px; }
  .page-sub{ font-size:13px; color:var(--muted); margin:0 0 22px; }
  .card{
    background:#fff; border:1px solid var(--line-soft); border-radius:10px;
    padding:18px 20px; margin-bottom:16px;
  }
  .row{ display:flex; gap:14px; flex-wrap:wrap; }
  .field{ display:flex; flex-direction:column; gap:4px; margin-bottom:12px; }
  .field label{ font-size:12px; color:var(--muted); }
  .field input, .field select, .field textarea{
    font-family:var(--font-sans); font-size:13.5px; padding:7px 9px; border:1px solid var(--line);
    border-radius:6px; background:#fdfcf9; color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:70px; }
  button{
    font-family:var(--font-sans); font-size:13px; padding:8px 14px; border-radius:6px;
    border:1px solid var(--line); background:#fff; color:var(--ink); cursor:pointer;
  }
  button:hover{ background:var(--chrome); }
  button.primary{ background:var(--ink); color:#fff; border-color:var(--ink); }
  button.primary:hover{ background:#324458; }
  button.danger{ color:var(--danger); border-color:#e0c9c4; }
  button.small{ padding:4px 9px; font-size:12px; }
  table.despesas{ width:100%; border-collapse:collapse; margin-top:8px; }
  table.despesas th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px;
    color:var(--muted); border-bottom:1px solid var(--line); padding:6px 6px;
  }
  table.despesas td{ padding:5px 6px; border-bottom:1px solid var(--line-soft); vertical-align:top;}
  table.despesas input{ width:100%; }
  .totais{ display:flex; gap:18px; margin-top:14px; }
  .totais .box{ background:var(--chrome); border-radius:8px; padding:10px 14px; flex:1; }
  .totais .box .label{ font-size:11px; color:var(--muted); }
  .totais .box .val{ font-size:18px; font-weight:bold; margin-top:2px; }
  .parcela-list .item{
    display:flex; align-items:center; justify-content:space-between; padding:11px 12px;
    background:#fff; border:1px solid var(--line-soft); border-radius:8px; margin-bottom:8px; cursor:pointer;
  }
  .parcela-list .item:hover{ border-color:var(--line); }
  .parcela-list .item .info .num{ font-weight:bold; font-size:14px; }
  .parcela-list .item .info .sub{ font-size:12px; color:var(--muted); margin-top:2px;}
  .stamp{
    font-family:var(--font-sans); font-weight:bold; font-size:10px; letter-spacing:.6px;
    text-transform:uppercase; border:2px solid; border-radius:50%; width:64px; height:64px;
    display:flex; align-items:center; justify-content:center; text-align:center;
    transform:rotate(-9deg); line-height:1.15; flex-shrink:0; padding:4px;
  }
  .stamp.ok{ color:var(--ok); border-color:var(--ok); background:var(--ok-bg); }
  .stamp.warn{ color:var(--warn); border-color:var(--warn); background:var(--warn-bg); }
  .stamp.danger{ color:var(--danger); border-color:var(--danger); background:var(--danger-bg); }
  .stamp-inline{ width:48px; height:48px; font-size:8.5px; margin-right:14px; }
  .doctabs{ display:flex; gap:4px; margin-bottom:14px; border-bottom:1px solid var(--line); }
  .doctabs .t{
    padding:8px 14px; font-size:13px; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  .doctabs .t.active{ color:var(--ink); border-bottom-color:var(--ink); font-weight:bold; }
  .doc-preview{
    background:var(--paper); border:1px solid var(--line); border-radius:4px;
    padding:38px 44px; font-family:var(--font-serif); font-size:13.5px; line-height:1.65; color:#26221c;
    max-width:640px;
  }
  .doc-preview h2{ font-size:15px; text-align:center; margin:0 0 4px; }
  .doc-preview h3{ font-size:13.5px; text-align:center; margin:0 0 18px; font-weight:normal; }
  .doc-preview table{ width:100%; border-collapse:collapse; margin:14px 0; font-size:12.5px; }
  .doc-preview table th, .doc-preview table td{ border:1px solid #999; padding:5px 7px; }
  .doc-preview table th{ background:#efe9db; }
  .doc-preview .sig{ margin-top:34px; text-align:center; }
  .doc-preview .sig .line{ border-top:1px solid #444; width:220px; margin:0 auto 4px; }
  .doc-actions{ margin:14px 0; display:flex; gap:8px; }
  .empty{ color:var(--muted); font-size:13px; padding:30px 0; text-align:center; }
  .badge-mini{ font-size:11px; padding:2px 7px; border-radius:20px; font-weight:bold; }
  .badge-mini.ok{ background:var(--ok-bg); color:var(--ok); }
  .badge-mini.warn{ background:var(--warn-bg); color:var(--warn); }
  .badge-mini.danger{ background:var(--danger-bg); color:var(--danger); }
  .anexo-caixa{ width:100%; height:520px; background:#eee; display:flex; align-items:center; justify-content:center; font-size:11px; color:#888; border:1px solid #ccc; overflow:hidden; }
  @media print{
    @page { margin: 16mm 14mm; }
    .sidebar, .no-print{ display:none !important; }
    .main{ padding:0; }
    .doc-preview{ border:none; max-width:none; padding:0; }
    .doc-preview table{ page-break-inside:auto; }
    .doc-preview table thead{ display:table-header-group; }
    .doc-preview table tfoot{ display:table-footer-group; }
    .doc-preview table tr{ page-break-inside:avoid; page-break-after:auto; }
    .doc-preview h2, .doc-preview h3{ page-break-after:avoid; }
    .doc-preview .sig{ page-break-inside:avoid; }
    .anexo-caixa{ height:calc(100vh - 90px); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar no-print" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

function hashSimples(str){
  str = String(str||'');
  let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
  for(let i=0;i<str.length;i++){
    const ch = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1>>>16), 2246822507) ^ Math.imul(h2 ^ (h2>>>13), 3266489909);
  h2 = Math.imul(h2 ^ (h2>>>16), 2246822507) ^ Math.imul(h1 ^ (h1>>>13), 3266489909);
  return (4294967296*(2097151&h2)+(h1>>>0)).toString(16);
}

let driveState = { connected:false, connecting:false, fileId:null, lastModifiedTime:null, contaEmail:'', duplicadosEncontrados:0 };
let googleAccessToken = null;
let googleTokenClient = null;
let driveAnexos = {}; // cache em memória: storageKey -> dataUrl, espelha o que está salvo no Drive

function googleClientIdConfigurado(){
  return !!GOOGLE_CLIENT_ID && GOOGLE_CLIENT_ID.indexOf('COLOQUE_AQUI') !== 0;
}
function inicializarGoogleTokenClient(){
  if(googleTokenClient) return true;
  if(typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) return false;
  googleTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_DRIVE_SCOPE,
    callback: ''
  });
  return true;
}
function solicitarToken(prompt){
  return new Promise((resolve)=>{
    if(!inicializarGoogleTokenClient()){ resolve(null); return; }
    googleTokenClient.callback = (resp)=>{
      if(resp && resp.access_token){ googleAccessToken = resp.access_token; resolve(resp.access_token); }
      else{ resolve(null); }
    };
    try{ googleTokenClient.requestAccessToken({ prompt: prompt }); }
    catch(e){ resolve(null); }
  });
}
async function driveApiFetchJson(url, options){
  options = options || {};
  options.headers = Object.assign({}, options.headers||{}, { Authorization: 'Bearer '+googleAccessToken });
  let resp = await fetch(url, options);
  if(resp.status === 401){
    const novo = await solicitarToken('');
    if(novo){
      options.headers.Authorization = 'Bearer '+googleAccessToken;
      resp = await fetch(url, options);
    }
  }
  if(!resp.ok){ throw new Error('Erro na comunicação com o Google Drive ('+resp.status+')'); }
  return await resp.json();
}
async function prepararArquivoDrive(){
  const q = encodeURIComponent(`name='${GOOGLE_DRIVE_FILENAME}' and trashed=false`);
  const busca = await driveApiFetchJson('https://www.googleapis.com/drive/v3/files?q='+q+'&orderBy=createdTime&fields=files(id,name,modifiedTime,createdTime)&spaces=drive&pageSize=50');
  if(busca && busca.files && busca.files.length){
    if(busca.files.length > 1){
      console.warn('Atenção: existem '+busca.files.length+' arquivos "'+GOOGLE_DRIVE_FILENAME+'" no Drive. Usando o mais antigo (original).', busca.files);
    }
    driveState.fileId = busca.files[0].id;
    driveState.lastModifiedTime = busca.files[0].modifiedTime;
    driveState.duplicadosEncontrados = busca.files.length - 1;
    return;
  }
  driveState.duplicadosEncontrados = 0;
  const conteudoInicial = JSON.stringify(Object.assign({}, clone(DEFAULT_STATE), { __anexosData:{} }));
  const boundary = 'pc_boundary_'+Date.now();
  const metadata = { name: GOOGLE_DRIVE_FILENAME, mimeType: 'application/json' };
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`+
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${conteudoInicial}\r\n`+
    `--${boundary}--`;
  const criado = await driveApiFetchJson('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime', {
    method: 'POST',
    headers: { 'Content-Type': 'multipart/related; boundary='+boundary },
    body: body
  });
  driveState.fileId = criado.id;
  driveState.lastModifiedTime = criado.modifiedTime;
}
async function driveDownloadFileContent(){
  const meta = await driveApiFetchJson(`https://www.googleapis.com/drive/v3/files/${driveState.fileId}?fields=modifiedTime`);
  if(meta && meta.modifiedTime) driveState.lastModifiedTime = meta.modifiedTime;
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${driveState.fileId}?alt=media`, {
    headers: { Authorization: 'Bearer '+googleAccessToken }
  });
  if(!resp.ok) throw new Error('Falha ao baixar arquivo do Drive');
  const texto = await resp.text();
  return texto && texto.length ? texto : null;
}
async function driveUploadFileContent(conteudoTexto){
  const resp = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveState.fileId}?uploadType=media&fields=modifiedTime`, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer '+googleAccessToken, 'Content-Type': 'application/json' },
    body: conteudoTexto
  });
  if(!resp.ok) throw new Error('Falha ao salvar no Drive');
  const json = await resp.json();
  if(json && json.modifiedTime) driveState.lastModifiedTime = json.modifiedTime;
  return json;
}

async function storageGet(key){
  if(driveState.connected){
    if(key === STORAGE_KEY){
      const conteudo = await driveDownloadFileContent();
      if(conteudo===null) return null;
      const parsed = JSON.parse(conteudo);
      driveAnexos = parsed.__anexosData || {};
      delete parsed.__anexosData;
      return { key, value: JSON.stringify(parsed), shared:true };
    }
    if(driveAnexos && Object.prototype.hasOwnProperty.call(driveAnexos, key)){
      return { key, value: driveAnexos[key], shared:true };
    }
    return null;
  }
  if(temStorageServidor()){
    return await window.storage.get(key, true);
  }
  if(temLocalStorage()){
    usandoArmazenamentoLocal = true;
    const v = localStorage.getItem(key);
    if(v===null) return null;
    return { key, value: v, shared:false };
  }
  throw new Error('Nenhum armazenamento disponível');
}
async function storageSet(key, value){
  if(driveState.connected){
    if(key === STORAGE_KEY){
      const parsedState = JSON.parse(value);
      const paraSalvar = Object.assign({}, parsedState, { __anexosData: driveAnexos });
      await driveUploadFileContent(JSON.stringify(paraSalvar));
      return { key, value, shared:true };
    }
    driveAnexos[key] = value;
    return { key, value, shared:true };
  }
  if(temStorageServidor()){
    return await window.storage.set(key, value, true);
  }
  if(temLocalStorage()){
    usandoArmazenamentoLocal = true;
    localStorage.setItem(key, value);
    return { key, value, shared:false };
  }
  throw new Error('Nenhum armazenamento disponível');
}

async function loadState(){
  let ok = false;
  for(let attempt=0; attempt<3 && !ok; attempt++){
    try{
      const res = await storageGet(STORAGE_KEY);
      if(res && res.value){ state = JSON.parse(res.value); }
      else { state = clone(DEFAULT_STATE); }
      ok = true;
    }catch(e){
      if(attempt<2){ await new Promise(r=>setTimeout(r,600)); }
      else { state = clone(DEFAULT_STATE); state.__loadError = true; }
    }
  }
  if(!state.config) state.config = clone(DEFAULT_STATE.config);
  if(!state.parcelas) state.parcelas = [];
  if(!state.fornecedores) state.fornecedores = clone(DEFAULT_STATE.fornecedores);
  state.parcelas.forEach(p=>{
    if(!p.recebimentos){
      p.recebimentos = [{id: uid(), numero: p.numero||1, data: p.dataRecebimento||'', valor: p.valorRecebido||0}];
      delete p.numero; delete p.dataRecebimento; delete p.valorRecebido;
    }
    (p.despesas||[]).forEach(d=>{ if(!d.categoria) d.categoria = 'Castração'; if(typeof d.justificativa==='undefined') d.justificativa=''; });
    if(typeof p.entregue === 'undefined') p.entregue = false;
    if(typeof p.dataEntrega === 'undefined') p.dataEntrega = '';
  });
  Object.keys(state.config).forEach(mun=>{
    const cfg = state.config[mun];
    if(typeof cfg.prazoUtilizacaoDias === 'undefined') cfg.prazoUtilizacaoDias = 60;
    if(typeof cfg.tipoParceiro === 'undefined') cfg.tipoParceiro = 'municipio';
    if(!cfg.termos){
      cfg.termos = [{
        id: 'termo_default_'+mun,
        nome: cfg.termo || 'Termo',
        valorParcelaPadrao: cfg.valorParcelaPadrao||0,
        exigeParecer: cfg.exigeParecer!==false,
        exigeExecFinanceira: !!cfg.exigeExecFinanceira,
        valorProgramadoPorCategoria: cfg.valorProgramadoPorCategoria || {'Castração':0,'Ração':0,'Medicamentos':0}
      }];
      delete cfg.termo; delete cfg.valorParcelaPadrao; delete cfg.exigeParecer; delete cfg.exigeExecFinanceira; delete cfg.valorProgramadoPorCategoria; delete cfg.valorTotalProgramado;
    }
  });
  state.parcelas.forEach(p=>{
    if(!p.termoId){
      const cfg = state.config[p.municipio];
      p.termoId = cfg.termos[0].id;
    }
  });
  const turvoCfg = state.config['turvo'];
  if(turvoCfg && turvoCfg.termos && !turvoCfg.termos.some(t=>t.nome && t.nome.indexOf('04/2026')!==-1)){
    turvoCfg.termos.push({
      id: uid(),
      nome: 'Termo de Fomento 04/2026',
      valorParcelaPadrao: 8648.95,
      totalParcelas: 9,
      exigeParecer: true,
      exigeExecFinanceira: true,
      encerrado: false,
      valorProgramadoPorCategoria: {'Castração':3448.95,'Ração':3466.67,'Medicamentos':1733.33}
    });
  }
  Object.keys(state.config).forEach(mun=>{
    const c = state.config[mun];
    (c.termos||[]).forEach(t=>{
      if(typeof t.encerrado === 'undefined') t.encerrado = false;
      if(typeof t.totalParcelas === 'undefined') t.totalParcelas = 12;
    });
  });
  if(turvoCfg && turvoCfg.termos){
    const termo002 = turvoCfg.termos.find(t=>t.nome && t.nome.indexOf('002/2025')!==-1);
    if(termo002 && !termo002.encerrado){ termo002.encerrado = true; }
    if(termo002){
      const prog = termo002.valorProgramadoPorCategoria || {};
      const totalProg = (Number(prog['Castração'])||0) + (Number(prog['Ração'])||0) + (Number(prog['Medicamentos'])||0);
      if(totalProg === 0){
        termo002.valorProgramadoPorCategoria = { 'Castração': 3000.00, 'Ração': 2227.00, 'Medicamentos': 1259.70 };
      }
    }
    const termo042026 = turvoCfg.termos.find(t=>t.nome && t.nome.indexOf('04/2026')!==-1);
    if(termo042026){
      const prog2 = termo042026.valorProgramadoPorCategoria || {};
      const totalProg2 = (Number(prog2['Castração'])||0) + (Number(prog2['Ração'])||0) + (Number(prog2['Medicamentos'])||0);
      const eraEstimativaAntiga = Math.abs((Number(prog2['Castração'])||0) - 4000.01) < 0.02 && Math.abs((Number(prog2['Ração'])||0) - 2969.34) < 0.02;
      if(totalProg2 === 0 || eraEstimativaAntiga){
        termo042026.valorProgramadoPorCategoria = { 'Castração': 3448.95, 'Ração': 3466.67, 'Medicamentos': 1733.33 };
      }
      if(Math.abs((Number(termo042026.valorParcelaPadrao)||0) - 8648.96) < 0.02){
        termo042026.valorParcelaPadrao = 8648.95;
      }
      if(Number(termo042026.totalParcelas)===12){
        termo042026.totalParcelas = 9;
      }
    }
  }
  DEFAULT_STATE.fornecedores.forEach(df=>{
    const existente = state.fornecedores.find(f=>f.nome===df.nome);
    if(!existente){ state.fornecedores.push(clone(df)); }
    else if(!existente.documento && df.documento){ existente.documento = df.documento; }
  });
  if(!state.security){ state.security = { senhaHash: null }; }
}

async function verificarAtualizacoes(){
  if(verificandoAtualizacoes) return;

  verificandoAtualizacoes = true;

    if(driveState.connected && driveState.fileId){

      if(meta && meta.modifiedTime && driveState.lastModifiedTime && meta.modifiedTime !== driveState.lastModifiedTime && !atualizacaoDisponivel){
        atualizacaoDisponivel = true;

        if(view.page) render();

      if(res && res.value){

          atualizacaoDisponivel = true;
          renderSidebar();
          if(view.page) render();
        }

    }

function numerosArray(p){ return (p.recebimentos||[]).map(r=>Number(r.numero)||0); }
function formatNumerosList(nums){
  const s = nums.slice().sort((a,b)=>a-b);
  if(!s.length) return '';
  if(s.length===1) return String(s[0]);
  if(s.length===2) return s[0]+' e '+s[1];
  return s.slice(0,-1).join(', ')+' e '+s[s.length-1];
}

function minDataRecebimento(p){

function despesaForaDoPrazo(d, p){
  if(!d.data) return false;
  const referencia = maxDataRecebimento(p);
  if(!referencia) return false;
  const prazo = new Date(referencia); prazo.setDate(prazo.getDate()+prazoDiasDoMunicipio(p.municipio));
  return parseISO(d.data) > prazo;
}
function atribuirDespesasPorRecebimento(p){
  const recebimentosOrdenados = (p.recebimentos||[]).slice().sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  const grupos = recebimentosOrdenados.map(r=>({recebimento:r, despesas:[]}));
  (p.despesas||[]).forEach(d=>{
    let idx = 0;
    for(let i=0;i<recebimentosOrdenados.length;i++){
      const dataRec = recebimentosOrdenados[i].data;
      if(!d.data || !dataRec || d.data >= dataRec){ idx = i; }
    }
    grupos[idx].despesas.push(d);
  });
  return grupos;
}
function despesasNumeradas(pList){
  const resultado = [];
  pList.forEach(px=>{
    if((px.recebimentos||[]).length<=1){
      const numero = px.recebimentos[0] ? px.recebimentos[0].numero : null;
      (px.despesas||[]).forEach(d=> resultado.push({numero, categoria:d.categoria||'Castração', valor:Number(d.valor)||0}));
    } else {
      atribuirDespesasPorRecebimento(px).forEach(g=>{

      });
    }
  });
  return resultado;
}

function deadlineInfo(p){
  const datas = (p.recebimentos||[]).map(r=>parseISO(r.data)).filter(Boolean);
  if(!datas.length) return {status:'sem-data', diasRestantes:null, prazo:null};
  const diasPrazo = prazoDiasDoMunicipio(p.municipio);
  let earliestPrazo = null;
  datas.forEach(d=>{
    const prazo = new Date(d); prazo.setDate(prazo.getDate()+diasPrazo);
    if(!earliestPrazo || prazo < earliestPrazo) earliestPrazo = prazo;
  });
  const diff = Math.ceil((earliestPrazo - todayLocal())/86400000);
  let status = 'ok';
  if(diff < 0) status = 'danger';
  else if(diff <= 10) status = 'warn';
  return {status, diasRestantes:diff, prazo:earliestPrazo};
}
function stampLabel(info){
  if(info.status==='sem-data') return 'SEM\nDATA';
  if(info.status==='danger') return 'VENCIDO\n' + Math.abs(info.diasRestantes) + ' dias';
  if(info.status==='warn') return 'ATENÇÃO\n' + info.diasRestantes + ' dias';
  return 'NO PRAZO\n' + info.diasRestantes + ' dias';
}
function stampDisplay(p){
  if(p.entregue){
    return { cssClass:'ok', label:'ENTREGUE\n'+(p.dataEntrega||'') };
  }
  const info = deadlineInfo(p);
  return { cssClass: info.status==='sem-data'?'ok':info.status, label: stampLabel(info) };
}

async function handlePdfUpload(inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  const st = view.importState;
  st.processandoPdf = true;
  st.erroPdf = '';
  render();
  try{
    const arrayBuffer = await file.arrayBuffer();
    const texto = await extrairTextoPDF(arrayBuffer);
    st.rawText = texto;
    st.processandoPdf = false;
    render();
  }catch(e){
    st.processandoPdf = false;
    st.erroPdf = 'Não consegui ler esse PDF automaticamente (' + (e.message||'erro desconhecido') + '). Tente colar o texto manualmente.';
    render();
  }
  inputEl.value = '';
}
function updateImportField(field, value){
  const st = view.importState;

  if(field==='municipio'){ st.termoId = null; st.parcelaId = 'nova'; }
  if(field==='termoId'){ st.parcelaId = 'nova'; }
  render();
}
function updateImportItem(idx, field, value){

function analisarExtrato(){
  const st = view.importState;
  if(!st.rawText || !st.rawText.trim()){ alert('Cole o texto do extrato antes de analisar.'); return; }
  st.parsed = parseExtrato(st.rawText, st.ano);

function confirmarImportacao(){
  const st = view.importState;

    const existentes = parcelasDoTermo(st.municipio, st.termoId).flatMap(x=>numerosArray(x));

  selecionados.filter(t=>t.tipo==='C').forEach(t=>{

      proximoNumero = existentes.length ? Math.max(...existentes)+1 : 1;

  }
  saveState();
  goParcela(p.id);

async function extrairTextoPDF(arrayBuffer){
  if(typeof pdfjsLib === 'undefined'){
    throw new Error('Biblioteca de leitura de PDF não carregou. Verifique sua conexão e tente novamente, ou cole o texto manualmente.');
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  const linhas = [];
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const rows = {};
    content.items.forEach(item=>{
      const y = Math.round(item.transform[5]);
      if(!rows[y]) rows[y] = [];
      rows[y].push(item);
    });
    const ys = Object.keys(rows).map(Number).sort((a,b)=>b-a);
    ys.forEach(y=>{
      const rowItems = rows[y].sort((a,b)=>a.transform[4]-b.transform[4]);
      const linha = rowItems.map(it=>it.str).join(' ').replace(/\s+/g,' ').trim();
      if(linha) linhas.push(linha);
    });
  }
  return linhas.join('\n');
}

function normalizeDoc(s){ return (s||'').replace(/\D/g,''); }
function extrairDocumentos(texto){
  const matches = texto.match(/\d{2}\.\d{3}\.\d{3}[\s\/]?\d{4}-\d{2}/g) || [];
  return matches.map(normalizeDoc).filter(d=>d.length===14);
}
function matchFornecedor(blocoTexto){
  const docsBloco = extrairDocumentos(blocoTexto);
  for(const f of (state.fornecedores||[])){
    if(!f.documento) continue;
    const fdocs = f.documento.split(',').map(s=>normalizeDoc(s)).filter(Boolean);
    if(fdocs.some(fd => docsBloco.includes(fd))) return f;
  }
  const STOPWORDS_FORNECEDOR = ['veterinário','veterinária','clínica','distribuidora','agropecuária','medicamentos','ortopedia','traumatologia','associação','quatro','patas','ração','santos','dos','rodrigues'];
  const blocoUpper = blocoTexto.toUpperCase();
  for(const f of (state.fornecedores||[])){
    const palavras = f.nome.split(' ').filter(w=>w.length>3 && STOPWORDS_FORNECEDOR.indexOf(w.toLowerCase())===-1);
    if(palavras.some(p => blocoUpper.indexOf(p.toUpperCase())!==-1)) return f;
  }
  return null;
}
function categoriaSugerida(fornecedor){
  if(!fornecedor) return 'Outro';
  if(fornecedor.tipo==='Veterinário' || fornecedor.tipo==='Clínica veterinária') return 'Castração';
  if(fornecedor.tipo==='Ração') return 'Ração';
  if(fornecedor.tipo==='Medicamentos') return 'Medicamentos';
  return 'Outro';
}
const LINHAS_IGNORAR = /^(RESUMO|SALDO|\(\+\)|\(-\)|\(=\)|ENCARGOS|OUTRAS INFORMA|VENCIMENTO|TAXA|CUSTO EFETIVO|EXTRATOS EMITIDOS|Cuidado com|SAC:|OUVIDORIA|SICOOB|SISTEMA DE|PLATAFORMA|EXTRATO CONTA|COOP\.:|CONTA:|PER[IÍ]ODO:|HIST[OÓ]RICO DE)/i;
function parseExtrato(texto, ano){
  const linhas = texto.split('\n').map(l=>l.trim()).filter(Boolean);
  const transacaoRegex = /^(\d{2})\/(\d{2})\s+(.+?)\s+([\d.,]+)\s*([CD])\*?$/;
  const resultado = [];
  let atual = null;
  for(const linha of linhas){
    const m = linha.match(transacaoRegex);
    if(m){
      if(atual) resultado.push(atual);
      const [,dd,mm,desc,valorStr,tipo] = m;
      if(!LINHAS_IGNORAR.test(desc) && desc.toUpperCase().indexOf('SALDO')===-1){
        const valor = parseFloat(valorStr.replace(/\./g,'').replace(',','.'));
        atual = { data: ano+'-'+mm+'-'+dd, historicoBase: desc, detalhes: [], valor, tipo };
      } else {
        atual = null;
      }
    } else if(atual && !LINHAS_IGNORAR.test(linha)){
      atual.detalhes.push(linha);
    } else if(LINHAS_IGNORAR.test(linha)){
      if(atual) resultado.push(atual);
      atual = null;
    }
  }
  if(atual) resultado.push(atual);
  return resultado.map(t=>{
    const blocoTexto = t.historicoBase + ' ' + t.detalhes.join(' ');
    const fornecedor = matchFornecedor(blocoTexto);
    return {
      data: t.data,
      historico: fornecedor ? fornecedor.nome : t.historicoBase,
      valor: t.valor,
      tipo: t.tipo,
      categoria: categoriaSugerida(fornecedor),
      fornecedorId: fornecedor ? fornecedor.id : null,
      selecionado: true
    };
  });
}
function importarBackup(inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  const confirmMsg = 'Isso vai SUBSTITUIR todos os dados atuais pelos dados do arquivo de backup. Confirma?';
  if(!window.confirm(confirmMsg)){ inputEl.value = ''; return; }
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const imported = JSON.parse(e.target.result);
      if(!imported || typeof imported !== 'object'){ throw new Error('formato inválido'); }
      delete imported.__loadError;
      const anexosData = imported.__anexosData || {};
      delete imported.__anexosData;
      state = imported;
      if(!state.config) state.config = clone(DEFAULT_STATE.config);
      if(!state.parcelas) state.parcelas = [];
      if(!state.fornecedores) state.fornecedores = clone(DEFAULT_STATE.fornecedores);
      if(!state.security) state.security = { senhaHash: null };
      acessoLiberadoLocal = true;
      Object.keys(fotoCache).forEach(k=>delete fotoCache[k]);
      const chavesFotos = Object.keys(anexosData);
      for(const key of chavesFotos){
        try{ await storageSet(key, anexosData[key]); }catch(e){ /* ignora falha pontual, não interrompe a importação */ }
      }
      await saveState();
      goDashboard();
      alert('Backup importado com sucesso.' + (chavesFotos.length ? (' ('+chavesFotos.length+' foto(s)/arquivo(s) restaurados)') : ''));
    }catch(err){
      alert('Não foi possível ler esse arquivo como backup válido.');
    }
    inputEl.value = '';
  };
  reader.readAsText(file);
}
async function exportarBackup(btn){
  const textoOriginal = btn ? btn.textContent : null;
  try{
    if(btn){ btn.disabled = true; btn.textContent = 'Exportando (lendo fotos)...'; }
    const anexosData = {};
    for(const p of (state.parcelas||[])){
      for(const a of (p.anexos||[])){
        if((a.tipo==='foto' || a.tipo==='ficha') && a.storageKey){
          try{
            const res = fotoCache[a.id] ? {value:fotoCache[a.id]} : await storageGet(a.storageKey);
            if(res && res.value){ anexosData[a.storageKey] = res.value; }
          }catch(e){ /* ignora anexo que não pôde ser lido, o restante do backup segue normalmente */ }
        }
      }
    }
    const exportState = Object.assign({}, state, { __anexosData: anexosData });
    const data = JSON.stringify(exportState, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = todayLocal();
    const ts = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    a.href = url;
    a.download = 'backup-prestacoes-contas-'+ts+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }catch(e){
    console.error('Falha ao exportar backup', e);
    alert('Não foi possível exportar o backup.');
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = textoOriginal || 'Exportar backup'; }
  }
}

    <p class="page-sub">Cadastro compartilhado entre Ermo e Turvo. Ao lançar uma despesa, o nome sugere automaticamente a partir desta lista.</p>
    <div class="card no-print" id="fornecedor-form-card">
      ${fornecedorForm(null)}
    </div>
    <div class="parcela-list">${rows || '<div class="empty">Nenhum fornecedor cadastrado ainda.</div>'}</div>
  `;
}

function fornecedorForm(f){
  const editing = !!f;
  return `
    <strong style="font-size:14px;">${editing? 'Editar fornecedor' : 'Novo fornecedor'}</strong>
    <div class="row" style="margin-top:10px;">
      <div class="field" style="flex:2;min-width:220px;"><label>Nome</label><input id="ff-nome" value="${editing?escapeHtml(f.nome):''}" placeholder="ex: Clínica Veterinária Baschirotto"></div>
      <div class="field" style="flex:1;min-width:160px;"><label>Tipo</label>
        <select id="ff-tipo">
          ${['Veterinário','Clínica veterinária','Medicamentos','Agropecuária','Ração','Outro'].map(t=>`<option value="${t}" ${editing && f.tipo===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field" style="flex:1;min-width:180px;"><label>CPF / CNPJ (opcional)</label><input id="ff-doc" value="${editing?escapeHtml(f.documento||''):''}"></div>
      <div class="field" style="flex:1;min-width:180px;"><label>Contato (opcional)</label><input id="ff-contato" value="${editing?escapeHtml(f.contato||''):''}" placeholder="telefone / whatsapp"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="primary" onclick="salvarFornecedor(${editing?`'${f.id}'`:'null'})">${editing?'Salvar alterações':'Adicionar fornecedor'}</button>
      ${editing ? `<button onclick="goFornecedores()">Cancelar</button>` : ''}
    </div>
  `;
}

function editarFornecedor(id){
  const f = state.fornecedores.find(x=>x.id===id);
  document.getElementById('main').innerHTML = `
    <h1 class="page-title">Fornecedores</h1>
    <div class="card no-print">${fornecedorForm(f)}</div>
  `;
}

function salvarFornecedor(id){
  const nome = document.getElementById('ff-nome').value.trim();
  if(!nome) return;
  const tipo = document.getElementById('ff-tipo').value;
  const documento = document.getElementById('ff-doc').value.trim();
  const contato = document.getElementById('ff-contato').value.trim();
  if(id){
    const f = state.fornecedores.find(x=>x.id===id);
    f.nome = nome; f.tipo = tipo; f.documento = documento; f.contato = contato;
  } else {
    state.fornecedores.push({id: uid(), nome, tipo, documento, contato});
  }
  saveState();
  goFornecedores();
}

function removerFornecedor(id){
  state.fornecedores = state.fornecedores.filter(f=>f.id!==id);
  saveState();
  render();
}

function renderMunicipio(mun){
  const cfg = state.config[mun];
  const termos = (cfg.termos || []).slice().sort((a,b)=> (a.encerrado?1:0) - (b.encerrado?1:0));
  const sections = termos.map(t=>{
    const parcelas = parcelasDoTermo(mun, t.id);
    let rows = parcelas.map(p=>{
      const totalDesp = totalDespesas(p);
      const totalRec = totalRecebido(p);
      const saldo = totalRec - totalDesp;
      const stamp = stampDisplay(p);
      return `
        <div class="item" onclick="goParcela('${p.id}')" style="${p.entregue?'opacity:0.7;':''}">
          <div style="display:flex;align-items:center;">
            <div class="stamp stamp-inline ${stamp.cssClass}">${stamp.label.split('\\n').join('<br>')}</div>
            <div class="info">
              <div class="num">${parcelaWord(p)==='parcelas'?'Parcelas':'Parcela'} ${numerosLabel(p)||'?'}</div>
              <div class="sub">Recebido ${brl(totalRec)} · Gasto ${brl(totalDesp)} · Saldo ${brl(saldo)}</div>
            </div>
          </div>
          <button class="small danger" onclick="event.stopPropagation(); excluirParcela('${p.id}')">Excluir</button>
        </div>
      `;
    }).join('');
    if(!parcelas.length){ rows = `<div class="empty">Nenhuma prestação de contas lançada para este termo ainda.</div>`; }
    const numerosLancados = new Set(parcelas.flatMap(p=>numerosArray(p)));
    const progresso = t.totalParcelas ? `<span style="font-size:12px;color:var(--muted);">(${numerosLancados.size} de ${t.totalParcelas} parcelas lançadas)</span>` : '';
    return `
      <div style="margin-bottom:28px;${t.encerrado?'opacity:0.75;':''}">
        <div style="display:flex;align-items:center;gap:8px;justify-content:space-between;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <strong style="font-size:15px;">${escapeHtml(t.nome)}</strong>
            ${t.encerrado ? '<span class="badge-mini" style="background:var(--chrome-2);color:var(--muted);">Encerrado</span>' : ''}
            ${progresso}
          </div>
          ${t.encerrado ? '' : `<button class="small no-print" onclick="novaParcela('${mun}','${t.id}')">+ Nova prestação de contas</button>`}
        </div>
        <div class="parcela-list">${rows}</div>
      </div>
    `;
  }).join('');
  document.getElementById('main').innerHTML = `
    <h1 class="page-title">${cfg.nomeMunicipio}</h1>
    <p class="page-sub">${termos.length} termo(s)/projeto(s)</p>
    ${sections}
    <button class="no-print" onclick="goConfig('${mun}')" style="margin-top:8px;">+ Novo termo / projeto (em Configurações)</button>
  `;
}

function novaParcela(mun, termoId){
  const t = getTermo(mun, termoId);
  const existentes = parcelasDoTermo(mun, termoId).flatMap(p=>numerosArray(p));
  const proximo = existentes.length ? Math.max(...existentes)+1 : 1;
  const p = {
    id: uid(), municipio: mun, termoId: t.id, numeroOficio:'',
    recebimentos: [{id: uid(), numero: proximo, data:'', valor: t.valorParcelaPadrao || 0}],
    despesas: [], relatorioAtividades:'', entregue:false, dataEntrega:''
  };
  state.parcelas.push(p);
  saveState();
  goParcela(p.id);
}

function addRecebimento(id){
  const p = getParcela(id);
  const t = getTermo(p.municipio, p.termoId);
  const existentes = parcelasDoTermo(p.municipio, p.termoId).flatMap(x=>numerosArray(x));
  const proximo = existentes.length ? Math.max(...existentes)+1 : 1;
  p.recebimentos.push({id: uid(), numero: proximo, data:'', valor: t.valorParcelaPadrao || 0});
  saveState();
  render();
}
function updateRecebimento(id, idx, field, value){
  const p = getParcela(id);
  if(field==='numero' || field==='valor') p.recebimentos[idx][field] = Number(value)||0;
  else p.recebimentos[idx][field] = value;
  saveState();
  render();
}
function removeRecebimento(id, idx){
  const p = getParcela(id);
  if(p.recebimentos.length<=1) return;
  p.recebimentos.splice(idx,1);
  saveState();
  render();
}

function excluirParcela(id){
  state.parcelas = state.parcelas.filter(p=>p.id!==id);
  saveState();
  render();
}

        <label style="display:flex;align-items:center;gap:6px;font-size:13px;"><input type="checkbox" ${t.exigeExecFinanceira?'checked':''} onchange="updateTermoField('${mun}','${t.id}','exigeExecFinanceira',this.checked)"> Exige relatório de execução financeira por categoria</label>
      </div>
      ${t.exigeExecFinanceira ? `
      <div class="row">

        <div class="field" style="flex:1;min-width:160px;"><label>Programado — Ração (R$)</label><input type="number" step="0.01" value="${(t.valorProgramadoPorCategoria&&t.valorProgramadoPorCategoria['Ração'])||0}" onchange="updateTermoCategoria('${mun}','${t.id}','Ração',this.value)"></div>
        <div class="field" style="flex:1;min-width:160px;"><label>Programado — Medicamentos (R$)</label><input type="number" step="0.01" value="${(t.valorProgramadoPorCategoria&&t.valorProgramadoPorCategoria['Medicamentos'])||0}" onchange="updateTermoCategoria('${mun}','${t.id}','Medicamentos',this.value)"></div>

        ${t.encerrado

  document.getElementById('main').innerHTML = `
    <h1 class="page-title">Configurações — ${cfg.nomeMunicipio}</h1>

        <div class="field" style="flex:1;min-width:220px;">
          <label>Tipo de parceiro</label>
          <select id="cfg-tipo-parceiro" onchange="atualizarRotuloContato('${mun}')">
            <option value="municipio" ${cfg.tipoParceiro!=='empresa'?'selected':''}>Município / prefeitura</option>
            <option value="empresa" ${cfg.tipoParceiro==='empresa'?'selected':''}>Empresa privada</option>
          </select>
        </div>

      <div class="row">
        <div class="field" style="flex:1;min-width:220px;"><label id="cfg-prefeito-label">${cfg.tipoParceiro==='empresa'?'Contato / responsável pela empresa':'Prefeito / destinatário do ofício'}</label><input id="cfg-prefeito" value="${escapeHtml(cfg.prefeito)}"></div>

        <div class="field" style="flex:1;min-width:220px;"><label>Prazo para utilização do recurso (dias)</label><input id="cfg-prazo-dias" type="number" min="1" value="${cfg.prazoUtilizacaoDias||60}"></div>

      <button class="small danger no-print" onclick="removerParceiro('${mun}')">Remover este parceiro/município</button>

function removerParceiro(mun){
  const temParcelas = state.parcelas.some(p=>p.municipio===mun);
  if(temParcelas){ alert('Não é possível remover: existem prestações de contas lançadas para este município.'); return; }
  if(Object.keys(state.config).length<=1){ alert('É preciso manter ao menos um município/parceiro.'); return; }
  if(!window.confirm('Remover este município/parceiro e suas configurações?')) return;
  delete state.config[mun];
  saveState();
  goDashboard();
}

function addTermo(mun){
  const cfg = state.config[mun];
  cfg.termos = cfg.termos || [];
  cfg.termos.push({ id: uid(), nome:'Novo termo', valorParcelaPadrao:0, totalParcelas:12, exigeParecer:true, exigeExecFinanceira:false, encerrado:false, valorProgramadoPorCategoria:{'Castração':0,'Ração':0,'Medicamentos':0} });
  saveState();
  render();
}
function toggleEncerrado(mun, termoId, encerrado){
  const t = getTermo(mun, termoId);
  t.encerrado = !!encerrado;
  saveState();
  render();
}
function updateTermoField(mun, termoId, field, value){
  const t = getTermo(mun, termoId);
  if(field==='valorParcelaPadrao' || field==='totalParcelas') t[field] = Number(value)||0;
  else if(field==='exigeParecer' || field==='exigeExecFinanceira') t[field] = !!value;
  else t[field] = value;
  saveState();
  render();
}
function updateTermoCategoria(mun, termoId, categoria, value){
  const t = getTermo(mun, termoId);
  t.valorProgramadoPorCategoria = t.valorProgramadoPorCategoria || {};
  t.valorProgramadoPorCategoria[categoria] = Number(value)||0;
  saveState();
  render();
}
function removerTermo(mun, termoId){
  const cfg = state.config[mun];
  const temParcelas = state.parcelas.some(p=>p.municipio===mun && p.termoId===termoId);
  if(temParcelas){ alert('Não é possível remover: existem prestações de contas lançadas para este termo.'); return; }
  if((cfg.termos||[]).length<=1){ alert('É preciso manter ao menos um termo/projeto.'); return; }
  if(!window.confirm('Remover este termo/projeto?')) return;
  cfg.termos = cfg.termos.filter(t=>t.id!==termoId);
  saveState();
  render();
}

function salvarConfig(mun){
  const cfg = state.config[mun];
  cfg.nomeMunicipio = document.getElementById('cfg-nome-municipio').value || cfg.nomeMunicipio;
  cfg.tipoParceiro = document.getElementById('cfg-tipo-parceiro').value;
  cfg.prefeito = document.getElementById('cfg-prefeito').value;
  cfg.entidade = document.getElementById('cfg-entidade').value;
  cfg.cnpj = document.getElementById('cfg-cnpj').value;
  cfg.responsavelNome = document.getElementById('cfg-resp-nome').value;
  cfg.responsavelCpf = document.getElementById('cfg-resp-cpf').value;
  cfg.presidente = document.getElementById('cfg-presidente').value;
  cfg.tesoureira = document.getElementById('cfg-tesoureira').value;
  cfg.cidadeAssinatura = document.getElementById('cfg-cidade').value;
  cfg.prazoUtilizacaoDias = Number(document.getElementById('cfg-prazo-dias').value)||60;
  saveState();
  render();
}
function atualizarRotuloContato(mun){
  const tipo = document.getElementById('cfg-tipo-parceiro').value;
  const label = document.getElementById('cfg-prefeito-label');
  if(label) label.textContent = tipo==='empresa' ? 'Contato / responsável pela empresa' : 'Prefeito / destinatário do ofício';
}

function renderParcela(id){
  const p = getParcela(id);
  const cfg = effectiveCfg(p.municipio, p.termoId);
  const info = deadlineInfo(p);
  const ehEmpresa = cfg.tipoParceiro === 'empresa';
  let tabs;
  if(ehEmpresa){
    tabs = [['lancamentos','Lançamentos'],['recibo','Recibo'],['balancete','Balancete']];
  } else {
    tabs = [['lancamentos','Lançamentos'],['oficio','Ofício'],['balancete','Balancete']];
    if(cfg.exigeParecer) tabs.push(['parecer','Parecer']);
    if(cfg.exigeExecFinanceira) tabs.push(['execfin','Execução financeira']);
    if(cfg.exigeExecFinanceira) tabs.push(['atividades','Relatório de atividades']);
  }
  tabs.push(['anexos', ehEmpresa ? 'Fotos e prontuários' : 'Fotos e vídeos']);
  tabs.push(['porAnimal','Imprimir por animal']);

  const tabsHtml = tabs.map(([k,label])=>`<div class="t ${view.docTab===k?'active':''}" onclick="setDocTab('${k}')">${label}</div>`).join('');

  let body = '';
  if(view.docTab==='lancamentos') body = renderLancamentos(p, cfg, info);
  else if(view.docTab==='oficio') body = renderDocWrap(docOficio(p,cfg), 'oficio_'+cfg.nomeMunicipio+'_'+numerosLabel(p).replace(/[^0-9]+/g,'-'));
  else if(view.docTab==='recibo') body = renderDocWrap(docRecibo(p,cfg), 'recibo_'+cfg.nomeMunicipio+'_'+numerosLabel(p).replace(/[^0-9]+/g,'-'));
  else if(view.docTab==='balancete') body = renderDocWrap(docBalancete(p,cfg), 'balancete_'+cfg.nomeMunicipio+'_'+numerosLabel(p).replace(/[^0-9]+/g,'-'));
  else if(view.docTab==='parecer') body = renderDocWrap(docParecer(p,cfg), 'parecer_'+cfg.nomeMunicipio+'_'+numerosLabel(p).replace(/[^0-9]+/g,'-'));
  else if(view.docTab==='execfin') body = renderDocWrap(docExecFinanceira(p,cfg), 'execucao_financeira_'+cfg.nomeMunicipio+'_'+numerosLabel(p).replace(/[^0-9]+/g,'-'));
  else if(view.docTab==='atividades') body = renderAtividades(p,cfg);
  else if(view.docTab==='anexos') body = renderAnexos(p,cfg);
  else if(view.docTab==='porAnimal') body = renderPorAnimal(p,cfg);

  document.getElementById('main').innerHTML = `
    <div class="no-print" style="display:flex;align-items:center;gap:14px;margin-bottom:6px;flex-wrap:wrap;">
      <div class="stamp ${stampDisplay(p).cssClass}">${stampDisplay(p).label.split('\\n').join('<br>')}</div>
      <div style="flex:1;">
        <h1 class="page-title" style="margin-bottom:0;">${cfg.nomeMunicipio} — ${parcelaWord(p)==='parcelas'?'Parcelas':'Parcela'} ${numerosLabel(p)}</h1>
        <p class="page-sub" style="margin-bottom:2px;">${cfg.termo}${cfg.totalParcelas ? ' · parcela(s) '+numerosLabel(p)+' de '+cfg.totalParcelas : ''}</p>
        <p style="font-size:11px;color:var(--muted);margin:0;">Prazo de ${prazoDiasDoMunicipio(p.municipio)} dias para utilizar o recurso (não é o prazo de entrega da prestação de contas)</p>
      </div>
      <button class="small ${p.entregue?'':'primary'}" onclick="toggleEntregue('${p.id}')">${p.entregue?'Desmarcar entrega':'Marcar como entregue'}</button>
    </div>
    <div class="doctabs no-print">${tabsHtml}</div>
    ${body}
  `;
  if(view.docTab==='anexos') carregarFotosVisiveis(p);
  if(view.docTab==='porAnimal') carregarAnexosPorAnimal(p);
}

function setDocTab(tab){ view.docTab = tab; render(); }
const fotoCache = {};

function renderAnexos(p, cfg){
  const fotos = (p.anexos||[]).filter(a=>a.tipo==='foto');
  const videos = (p.anexos||[]).filter(a=>a.tipo==='video');

      <button class="small danger no-print" onclick="removerAnexo('${p.id}','${a.id}')" style="position:absolute;top:4px;right:4px;padding:2px 6px;font-size:11px;">×</button>
      <input type="text" value="${escapeHtml(a.animal||'')}" placeholder="Nome do animal" onchange="updateAnexoAnimal('${p.id}','${a.id}',this.value)" style="width:100%;margin-top:4px;font-size:11px;padding:4px 6px;">

  `).join('');
  const videosHtml = videos.map(a=>`
    <div class="item" style="cursor:default;">

function lerImagemComoDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function comprimirImagem(file, maxDim, qualidade){
  maxDim = maxDim || 1000; qualidade = qualidade || 0.72;
  return lerImagemComoDataURL(file).then(dataUrl=>{
    return new Promise((resolve,reject)=>{
      const img = new Image();
      img.onload = ()=>{
        let width = img.width, height = img.height;
        if(width>maxDim || height>maxDim){
          if(width>height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', qualidade));
      };
      img.onerror = reject;
      img.src = dataUrl;
    });
  });
}
function prepararLogoUpload(file){
  return lerImagemComoDataURL(file).then(dataUrl=>{
    return new Promise((resolve,reject)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 400;
        let width = img.width, height = img.height;
        if(width>maxDim || height>maxDim){
          if(width>height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = reject;
      img.src = dataUrl;
    });
  });
}

  render();

async function adicionarFichas(inputEl, parcelaId){
  const files = Array.from(inputEl.files||[]);
  if(!files.length) return;
  const p = getParcela(parcelaId);
  p.anexos = p.anexos || [];
  p.processandoFichas = true;
  render();
  for(const file of files){
    try{
      let dataUrl;
      if(file.type && file.type.startsWith('image/')){
        dataUrl = await comprimirImagem(file);
      } else {
        dataUrl = await lerImagemComoDataURL(file);
      }
      const anexoId = uid();
      const key = 'ficha_'+anexoId;
      await storageSet(key, dataUrl);
      p.anexos.push({ id:anexoId, tipo:'ficha', nome:file.name, storageKey:key, dataAdicao: formatDateBR(todayLocal()) });
    }catch(e){ console.error('Falha ao processar ficha', e); }
  }
  p.processandoFichas = false;
  saveState();
  render();
}

async function abrirFicha(anexoId, storageKey){
  try{
    const res = fotoCache[anexoId] ? {value:fotoCache[anexoId]} : await storageGet(storageKey);
    if(!res || !res.value){ alert('Não foi possível carregar esse arquivo.'); return; }
    fotoCache[anexoId] = res.value;
    const dataUrl = res.value;
    const arr = dataUrl.split(',');
    const mimeMatch = arr[0].match(/:(.*?);/);
    const mime = mimeMatch ? mimeMatch[1] : 'application/octet-stream';
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while(n--){ u8arr[n] = bstr.charCodeAt(n); }
    const blob = new Blob([u8arr], {type:mime});
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
  }catch(e){ alert('Não foi possível abrir esse arquivo.'); }
}
function removerAnexo(parcelaId, anexoId){
  const p = getParcela(parcelaId);
  const anexo = (p.anexos||[]).find(a=>a.id===anexoId);
  if(anexo && (anexo.tipo==='foto' || anexo.tipo==='ficha') && anexo.storageKey){
    try{
      if(driveState.connected){ delete driveAnexos[anexo.storageKey]; }
      else if(temStorageServidor() && window.storage.delete){ window.storage.delete(anexo.storageKey, true).catch(()=>{}); }
      else if(temLocalStorage()){ localStorage.removeItem(anexo.storageKey); }
    }catch(e){}
    delete fotoCache[anexoId];
  }
  p.anexos = (p.anexos||[]).filter(a=>a.id!==anexoId);
  saveState();
  render();
}

    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while(n--){ u8arr[n] = bstr.charCodeAt(n); }
    const blob = new Blob([u8arr], {type:mime});

async function injetarConteudoAnexo(elId, dataUrl){
  const el = document.getElementById(elId);
  if(!el) return;
  if(dataUrl.indexOf('data:application/pdf')===0){
    try{
      const arr = dataUrl.split(',');
      const bstr = atob(arr[1]);
      let n = bstr.length; const u8 = new Uint8Array(n);
      while(n--){ u8[n]=bstr.charCodeAt(n); }
      const blob = new Blob([u8.slice()], {type:'application/pdf'});
      const url = URL.createObjectURL(blob);
      if(typeof pdfjsLib !== 'undefined'){
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument({data: u8.slice()}).promise;
        const page = await pdf.getPage(1);
        const viewportBase = page.getViewport({scale:1});
        const larguraAlvo = el.clientWidth || 480;
        const scale = larguraAlvo / viewportBase.width;
        const viewport = page.getViewport({scale});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({canvasContext: canvas.getContext('2d'), viewport: viewport}).promise;
        canvas.style.maxWidth = '100%';
        canvas.style.maxHeight = '100%';
        canvas.style.width = 'auto';
        canvas.style.height = 'auto';
        canvas.style.display = 'block';
        canvas.style.margin = '0 auto';
        el.innerHTML = '';
        el.style.cursor = 'pointer';
        el.title = 'Clique para abrir o PDF completo';
        el.appendChild(canvas);
        el.onclick = ()=> window.open(url, '_blank');
      } else {
        el.innerHTML = `<a href="${url}" target="_blank" style="font-size:11px;">Abrir PDF</a>`;
      }
    }catch(e){ el.innerHTML = '<span style="font-size:10px;color:var(--danger);">Erro ao exibir PDF</span>'; }
  } else {
    el.innerHTML = `<img src="${dataUrl}" style="max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block;margin:0 auto;">`;
  }
}
async function carregarAnexosPorAnimal(p){
  const relevantes = (p.anexos||[]).filter(a=>a.tipo==='foto'||a.tipo==='ficha');

function updateParcela(id, field, value){
  const p = getParcela(id);

function separarPrestacao(parcelaId){
  const p = getParcela(parcelaId);
  if(!p || (p.recebimentos||[]).length<=1) return;
  const confirmMsg = 'Isso vai dividir esta prestação em '+p.recebimentos.length+' prestações separadas (uma por parcela). As despesas serão distribuídas pela data de pagamento (a despesa entra na parcela cujo recebimento é o mais recente até aquela data). Você poderá ajustar manualmente depois. Confirma?';
  if(!window.confirm(confirmMsg)) return;
  const recebimentosOrdenados = (p.recebimentos||[]).slice().sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  const novasParcelas = recebimentosOrdenados.map(r=>({
    id: uid(), municipio: p.municipio, termoId: p.termoId, numeroOficio:'',
    recebimentos: [{...r}], despesas: [], relatorioAtividades:'', anexos: (p.anexos||[]).slice()
  }));
  (p.despesas||[]).forEach(d=>{
    let destino = novasParcelas[0];
    for(let i=0;i<novasParcelas.length;i++){
      const dataRec = novasParcelas[i].recebimentos[0].data;
      if(!d.data || !dataRec || d.data >= dataRec){ destino = novasParcelas[i]; }
    }
    destino.despesas.push({...d});
  });
  state.parcelas = state.parcelas.filter(x=>x.id!==p.id);
  novasParcelas.forEach(np=>state.parcelas.push(np));
  saveState();
  goMunicipio(p.municipio);
}
function addDespesa(id){
  const p = getParcela(id);
  p.despesas = p.despesas || [];
  p.despesas.push({data:'', doc:'', historico:'', categoria:'Castração', valor:0});
  saveState();
  render();
}
function updateDespesa(id, idx, field, value){
  const p = getParcela(id);
  if(field==='valor') p.despesas[idx][field] = Number(value)||0;
  else p.despesas[idx][field] = value;
  saveState();
  render();
}
function removeDespesa(id, idx){
  const p = getParcela(id);
  p.despesas.splice(idx,1);
  saveState();
  render();
}

function renderDocWrap(html, filename){
  return `
    <div class="doc-actions no-print">

    </div>

}

function copiarTexto(filename){
  const el = document.getElementById('doc-'+filename);
  if(!el) return;
  const text = el.innerText;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text);
  }
}

function mesAnoLabel(ym){
  if(ym==='sem-data') return 'Sem data';
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const [y,m] = ym.split('-');
  return meses[parseInt(m,10)-1] + '/' + y;
}
function docBalancete(p, cfg){
  const totalPag = totalDespesas(p);
  const totalRec = totalRecebido(p);
  const saldo = totalRec - totalPag;
  const lancamentos = [
    ...(p.recebimentos||[]).map(r=>({tipo:'recebimento', data:r.data, ordem:0, doc:'', descricao:'Recebimento recurso Prefeitura Municipal de '+cfg.nomeMunicipio+' — parcela '+(r.numero||''), valor:r.valor})),
    ...(p.despesas||[]).map(d=>({tipo:'despesa', data:d.data, ordem:1, doc:d.doc||'', descricao:'Pagamento '+(d.historico||''), valor:d.valor}))
  ].sort((a,b)=>{
    const da = a.data||'', db = b.data||'';
    if(da!==db) return da.localeCompare(db);
    return a.ordem-b.ordem;
  });
  const mesesDistintos = new Set(lancamentos.map(l=> l.data ? l.data.slice(0,7) : 'sem-data'));
  const mostrarSubtotalMensal = mesesDistintos.size > 1;
  let rows = '';
  let mesAtual = null, recMes = 0, pagMes = 0, saldoAcumulado = 0;
  const linhaHtml = l => {
    saldoAcumulado += l.tipo==='recebimento' ? (Number(l.valor)||0) : -(Number(l.valor)||0);
    return `
    <tr>
      <td>${l.data?formatDateBR(parseISO(l.data)):''}</td>
      <td>${escapeHtml(l.doc)}</td>
      <td>${escapeHtml(l.descricao)}</td>
      <td>${l.tipo==='recebimento'?brl(l.valor):''}</td>
      <td>${l.tipo==='despesa'?brl(l.valor):''}</td>
      <td>${brl(saldoAcumulado)}</td>
    </tr>
  `;
  };
  const subtotalHtml = ym => `
    <tr style="background:#efe9db;">
      <td colspan="3"><strong>Subtotal ${mesAnoLabel(ym)}</strong></td>
      <td><strong>${brl(recMes)}</strong></td>
      <td><strong>${brl(pagMes)}</strong></td>
      <td><strong>Saldo do mês: ${brl(recMes-pagMes)}</strong></td>
    </tr>
  `;
  lancamentos.forEach(l=>{
    const ym = l.data ? l.data.slice(0,7) : 'sem-data';
    if(mostrarSubtotalMensal && mesAtual!==null && ym!==mesAtual){
      rows += subtotalHtml(mesAtual);
      recMes = 0; pagMes = 0;
    }
    mesAtual = ym;
    if(l.tipo==='recebimento') recMes += Number(l.valor)||0; else pagMes += Number(l.valor)||0;
    rows += linhaHtml(l);
  });
  if(mostrarSubtotalMensal && mesAtual!==null){ rows += subtotalHtml(mesAtual); }
  return `
    ${docLogo()}
    <h2>ESTADO DE SANTA CATARINA</h2>
    <h3>MUNICÍPIO DE ${escapeHtml(cfg.nomeMunicipio.toUpperCase())}</h3>
    <h3 style="margin-top:-10px;">BALANCETE DE PRESTAÇÃO DE CONTAS DE RECURSOS</h3>
    <p><strong>UNIDADE CONCEDENTE:</strong> Município de ${escapeHtml(cfg.nomeMunicipio.toUpperCase())} &nbsp; <strong>ENTIDADE BENEFICIADA:</strong> ${escapeHtml(cfg.entidade)}<br>
    <strong>CNPJ:</strong> ${escapeHtml(cfg.cnpj)} &nbsp; <strong>RESPONSÁVEL:</strong> ${escapeHtml(cfg.responsavelNome)} &nbsp; <strong>CPF:</strong> ${escapeHtml(cfg.responsavelCpf)}<br>
    <strong>Nº Termo:</strong> ${escapeHtml(cfg.termo)} &nbsp; <strong>Nº ${parcelaWord(p)==='parcelas'?'das parcelas':'da parcela'}:</strong> ${numerosLabel(p)}</p>
    <table>
      <thead><tr><th>Data</th><th>Nº doc. fiscal</th><th>Histórico</th><th>Recebimentos</th><th>Pagamentos</th><th>Saldo</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><th colspan="3">TOTAL GERAL</th><th>${brl(totalRec)}</th><th>${brl(totalPag)}</th><th>${brl(saldo)}</th></tr></tfoot>
    </table>
    <p>Saldo: <strong>${brl(saldo)}</strong></p>
    ${notaSaldoNegativo(saldo)}
    ${(()=>{
      const atrasadas = (p.despesas||[]).filter(d=>despesaForaDoPrazo(d,p));
      if(!atrasadas.length) return '';
      const itens = atrasadas.map(d=>`<li>${d.data?formatDateBR(parseISO(d.data)):''} — ${escapeHtml(d.historico||'')} (${brl(d.valor)}): ${escapeHtml(d.justificativa||'(justificativa não informada)')}</li>`).join('');
      return `<p style="margin-top:16px;"><strong>Justificativa(s) de pagamento(s) fora do prazo de ${prazoDiasDoMunicipio(p.municipio)} dias para utilização do recurso:</strong></p><ul>${itens}</ul>`;
    })()}
    <p>${escapeHtml(cfg.cidadeAssinatura)}, ${formatDateLong(todayLocal())}.</p>
    <div style="display:flex;justify-content:space-around;margin-top:30px;">
      <div class="sig"><div class="line"></div>${escapeHtml(cfg.presidente)}<br><span style="font-size:11px;">PRESIDENTE</span></div>
      <div class="sig"><div class="line"></div>${escapeHtml(cfg.tesoureira)}<br><span style="font-size:11px;">TESOUREIRA</span></div>
    </div>
  `;
}

function docExecFinanceira(p, cfg){
  const programadoObj = cfg.valorProgramadoPorCategoria || {};
  const recebimentosOrdenados = (p.recebimentos||[]).slice().sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  const grupos = atribuirDespesasPorRecebimento(p);
  const despesasPorNumero = {};
  grupos.forEach(g=>{ despesasPorNumero[g.recebimento.numero] = g.despesas; });
  const categoriasComDados = CATEGORIAS_DESPESA.filter(cat => {
    if(cat!=='Outro') return true;
    return (p.despesas||[]).some(d=>d.categoria==='Outro');
  });

  let saldoAcumulado = 0, totalProgramado = 0, totalExecutado = 0;
  const linhasHtml = [];
  recebimentosOrdenados.forEach(r=>{
    const despesasDaParcela = despesasPorNumero[r.numero] || [];
    categoriasComDados.forEach(cat=>{
      const programado = Number(programadoObj[cat])||0;
      const executado = despesasDaParcela.filter(d=>(d.categoria||'Castração')===cat).reduce((s,d)=>s+(Number(d.valor)||0),0);
      saldoAcumulado += programado - executado;
      totalProgramado += programado;
      totalExecutado += executado;
      linhasHtml.push(`
        <tr>
          <td>${escapeHtml(String(r.numero||''))}</td>
          <td>${escapeHtml(cat)}</td>
          <td>${brl(programado)}</td>
          <td>${brl(executado)}</td>
          <td></td>
          <td>${brl(saldoAcumulado)}</td>
        </tr>
      `);
    });
  });

  return `
    ${docLogo()}
    <h2 style="text-align:left;">RELATÓRIO DE EXECUÇÃO FINANCEIRA</h2>
    <p><strong>1. Nome Entidade Convenente, conforme o Cartão do CNPJ:</strong> ${escapeHtml(cfg.entidade)}<br>
    <strong>2. Termo de Parceria Nº/Ano:</strong> ${escapeHtml(cfg.termo)}<br>
    <strong>3. Tipo da Prestação de Contas:</strong> ( X ) Parcial &nbsp; <strong>Número ${parcelaWord(p)==='parcelas'?'das parcelas':'da parcela'}:</strong> ${numerosLabel(p)}</p>
    <table>
      <thead><tr><th>Etapa/Fase</th><th>Descrição</th><th>7. Valor total programado conforme Plano de trabalho</th><th>8. Valor Executado da Parcela</th><th>9. Valor Executada até a parcela (Acumulado)</th><th>10. Saldo a executar</th></tr></thead>
      <tbody>${linhasHtml.join('')}</tbody>
      <tfoot><tr><th colspan="2">TOTAL</th><th>${brl(totalProgramado)}</th><th>${brl(totalExecutado)}</th><th>${brl(0)}</th><th>${brl(saldoAcumulado)}</th></tr></tfoot>
    </table>
    <p>${escapeHtml(cfg.cidadeAssinatura)}, ${formatDateLong(todayLocal())}.</p>
    <div class="sig"><div class="line"></div>${escapeHtml(cfg.responsavelNome)}<br><span style="font-size:11px;">Representante legal</span></div>
  `;
}

    document.getElementById('main').innerHTML = `

        <strong style="color:var(--danger);">Não foi possível carregar seus dados salvos agora.</strong>
        <p style="margin:8px 0 0;font-size:13.5px;">Isso é provavelmente uma instabilidade temporária — <strong>não lance nada nesta tela</strong>, pois isso pode sobrescrever seus dados reais. Feche esta aba sem salvar nada e abra o link novamente em alguns instantes. Se seus dados voltarem a aparecer, está tudo bem.</p>
        <p style="margin:10px 0 0;font-size:13.5px;">Se você tiver um arquivo de backup exportado antes, pode restaurá-lo agora:</p>

  else if(view.page==='municipio') renderMunicipio(view.municipio);
  else if(view.page==='config') renderConfig(view.municipio);
  else if(view.page==='parcela') renderParcela(view.parcelaId);
}

function tentarLogin(){
  const val = (document.getElementById('login-senha').value)||'';
  if(state.security && hashSimples(val)===state.security.senhaHash){
    sessionUnlocked = true;
    render();
  } else {
    const erroEl = document.getElementById('login-erro');
    if(erroEl) erroEl.textContent = 'Senha incorreta.';
  }
}

(async function init(){
  await tentarReconectarDriveSilencioso();
  await loadState();
  localRev = Number(state.__rev)||0;
  render();
  setInterval(verificarAtualizacoes, 25000);
  if(typeof window!=='undefined' && window.addEventListener){
    window.addEventListener('focus', verificarAtualizacoes);
  }
  if(typeof document!=='undefined' && document.addEventListener){
    document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) verificarAtualizacoes(); });
  }
})();
</script>
